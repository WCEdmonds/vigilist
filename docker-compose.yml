services:
  db:
    # pgvector build of postgres:16 — clustering/semantic search need the
    # vector extension locally just like Neon provides it in prod.
    image: pgvector/pgvector:pg16
    environment:
      POSTGRES_DB: vigilist
      POSTGRES_USER: vigilist
      POSTGRES_PASSWORD: vigilist_dev
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data

volumes:
  pgdata:
