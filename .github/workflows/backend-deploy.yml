name: Deploy backend to Cloud Run

on:
  push:
    branches:
      - main
      - feature/firebase-auth
    paths:
      - 'backend/**'
      - '.github/workflows/backend-deploy.yml'
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write
    env:
      PROJECT_ID: ediscover
      REGION: us-central1
      SERVICE_NAME: vigilist-api
      TASKS_QUEUE: vigilist-ingest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.13'

      - name: Authenticate to Google Cloud
        uses: google-github-actions/auth@v2
        with:
          credentials_json: ${{ secrets.GCP_SA_KEY }}

      - name: Set up gcloud
        uses: google-github-actions/setup-gcloud@v2
        with:
          project_id: ${{ env.PROJECT_ID }}

      - name: Compute project metadata
        id: meta
        run: |
          PROJECT_NUMBER=$(gcloud projects describe $PROJECT_ID --format='value(projectNumber)')
          COMPUTE_SA="${PROJECT_NUMBER}-compute@developer.gserviceaccount.com"
          TASKS_AGENT="service-${PROJECT_NUMBER}@gcp-sa-cloudtasks.iam.gserviceaccount.com"
          echo "project_number=$PROJECT_NUMBER" >> $GITHUB_OUTPUT
          echo "compute_sa=$COMPUTE_SA" >> $GITHUB_OUTPUT
          echo "tasks_agent=$TASKS_AGENT" >> $GITHUB_OUTPUT

      - name: Create Cloud Tasks queue (idempotent)
        run: |
          gcloud tasks queues describe $TASKS_QUEUE --location=$REGION --project=$PROJECT_ID 2>/dev/null \
            || gcloud tasks queues create $TASKS_QUEUE --location=$REGION --project=$PROJECT_ID

      - name: Grant Cloud Run compute SA cloudtasks.enqueuer
        run: |
          gcloud projects add-iam-policy-binding $PROJECT_ID \
            --member="serviceAccount:${{ steps.meta.outputs.compute_sa }}" \
            --role="roles/cloudtasks.enqueuer" \
            --condition=None --quiet

      - name: Grant Cloud Tasks service agent tokenCreator on compute SA
        run: |
          gcloud iam service-accounts add-iam-policy-binding \
            ${{ steps.meta.outputs.compute_sa }} \
            --member="serviceAccount:${{ steps.meta.outputs.tasks_agent }}" \
            --role="roles/iam.serviceAccountTokenCreator" \
            --project=$PROJECT_ID --quiet

      - name: Run Alembic migrations against Neon
        run: |
          DB_URL=$(gcloud run services describe $SERVICE_NAME \
            --region=$REGION --project=$PROJECT_ID \
            --format='value(spec.template.spec.containers[0].env.filter(name=VIGILIST_DATABASE_URL).value)' 2>/dev/null || echo "")
          if [ -n "$DB_URL" ]; then
            cd backend
            pip install -q sqlalchemy[asyncio] asyncpg alembic pgvector
            VIGILIST_DATABASE_URL="$DB_URL" alembic upgrade head
          else
            echo "::warning::Could not fetch DATABASE_URL from Cloud Run — skipping migrations"
          fi

      - name: Get existing service URL (stable across deploys)
        id: url
        run: |
          URL=$(gcloud run services describe $SERVICE_NAME --region=$REGION --project=$PROJECT_ID --format='value(status.url)' 2>/dev/null || echo "")
          echo "url=$URL" >> $GITHUB_OUTPUT

      - name: Deploy to Cloud Run
        run: |
          SERVICE_URL="${{ steps.url.outputs.url }}"
          # On first deploy the URL won't exist yet; fall back to convention
          if [ -z "$SERVICE_URL" ]; then
            SERVICE_URL="https://${SERVICE_NAME}-$(gcloud projects describe $PROJECT_ID --format='value(projectNumber)')-uc.a.run.app"
          fi
          gcloud run deploy $SERVICE_NAME \
            --source backend \
            --region $REGION \
            --project $PROJECT_ID \
            --platform managed \
            --allow-unauthenticated \
            --timeout 3600 \
            --memory 1Gi \
            --update-env-vars="VIGILIST_CLOUD_RUN_SERVICE_URL=${SERVICE_URL},VIGILIST_CLOUD_TASKS_SERVICE_ACCOUNT=${{ steps.meta.outputs.compute_sa }},VIGILIST_GCP_PROJECT_ID=$PROJECT_ID,VIGILIST_GCP_LOCATION=$REGION,VIGILIST_CLOUD_TASKS_QUEUE=$TASKS_QUEUE" \
            --quiet

      - name: Grant compute SA run.invoker on the service
        run: |
          gcloud run services add-iam-policy-binding $SERVICE_NAME \
            --member="serviceAccount:${{ steps.meta.outputs.compute_sa }}" \
            --role="roles/run.invoker" \
            --region=$REGION --project=$PROJECT_ID --quiet
