name: Secret scan

# Server-side guard: scans every push and PR for committed secrets so a leak
# is caught in CI even if a developer hasn't installed local pre-commit hooks.
on:
  push:
    branches: ['**']
  pull_request:
  workflow_dispatch:

# Least privilege: the scan only needs to read the repo (and comment on PRs).
permissions:
  contents: read
  pull-requests: write

jobs:
  gitleaks:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0            # full history so the scan covers past commits too
          persist-credentials: false
      - name: Run gitleaks
        uses: gitleaks/gitleaks-action@v3
        env:
          # Required by gitleaks-action to scan pull_request events.
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GITLEAKS_CONFIG: .gitleaks.toml
