name: Secret scan

# Server-side guard: scans every push and PR for committed secrets so a leak
# is caught in CI even if a developer hasn't installed local pre-commit hooks.
on:
  push:
    branches: ['**']
  pull_request:
  workflow_dispatch:

jobs:
  gitleaks:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0   # full history so the scan covers past commits too
      - name: Run gitleaks
        uses: gitleaks/gitleaks-action@v2
        env:
          # Required by gitleaks-action v2 to scan pull_request events.
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GITLEAKS_CONFIG: .gitleaks.toml
