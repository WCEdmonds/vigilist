# This file was auto-generated by the Firebase CLI
# https://github.com/firebase/firebase-tools

name: Deploy to Firebase Hosting on merge
on:
  push:
    branches:
      - main
      - feature/firebase-auth
    # Only redeploy the app when something that affects the built site changes.
    # Without this, unrelated pushes (e.g. the marketing/ promo site) trigger a
    # full no-op rebuild + redeploy of the identical app.
    paths:
      - 'frontend/**'
      - 'firebase.json'
      - '.github/workflows/firebase-hosting-merge.yml'
  workflow_dispatch:
jobs:
  build_and_deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'npm'
          cache-dependency-path: frontend/package-lock.json
      - run: cd frontend && npm ci && npm run build
      - uses: FirebaseExtended/action-hosting-deploy@v0
        with:
          repoToken: ${{ secrets.GITHUB_TOKEN }}
          firebaseServiceAccount: ${{ secrets.FIREBASE_SERVICE_ACCOUNT_EDISCOVER }}
          channelId: live
          projectId: ediscover
